<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playlistify AI - Your Personal AI Music Agent</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="pages.css">
  <link rel="stylesheet" href="auth.css">
  <style>
    /* Landing Page Specific Styles */
    .landing-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .landing-logo {
      margin-bottom: 2rem;
    }

    .landing-logo img {
      width: 120px;
      height: 120px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-15px);
      }
    }

    .landing-title {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 800;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    .landing-title .highlight {
      background: linear-gradient(135deg, var(--spotify-green) 0%, var(--accent-cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .landing-tagline {
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      color: var(--text-secondary);
      max-width: 600px;
      margin: 0 auto 2.5rem;
      line-height: 1.6;
    }

    .landing-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 2.5rem;
      background: linear-gradient(135deg, var(--spotify-green) 0%, #1ed760 100%);
      color: #000;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 100px;
      transition: all 0.3s ease;
      box-shadow: 0 8px 30px rgba(29, 185, 84, 0.4);
    }

    .landing-cta:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 40px rgba(29, 185, 84, 0.5);
    }

    .landing-cta svg {
      transition: transform 0.3s ease;
    }

    .landing-cta:hover svg {
      transform: translateX(5px);
    }

    .landing-features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 4rem;
      max-width: 800px;
    }

    .feature-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.2rem;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .feature-badge i {
      color: var(--spotify-green);
    }
  </style>
</head>

<body>
  <!-- Animated Gradient Background -->
  <div class="gradient-bg">
    <div class="gradient-overlay"></div>
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>
    <div class="gradient-blob blob-3"></div>
    <div class="gradient-blob blob-4"></div>
    <div class="noise-overlay"></div>
  </div>

  <!-- Navigation -->
  <nav>
    <a href="/" class="logo">
      <img src="images/favicon.png" alt="Playlistify AI" class="logo-img">
      <span class="logo-text">
        Playlistify <span class="logo-ai">AI</span>
        <span class="logo-agent">agent</span>
      </span>
    </a>
    <div class="nav-links">
      <a href="app.html" class="nav-link">Home</a>
      <a href="collab.html" class="nav-link">Collab</a>
      <a href="timeline.html" class="nav-link">Timeline</a>
      <a href="curated.html" class="nav-link">Curated</a>
      <a href="app.html?djmode=true" class="nav-link dj-toggle">
        <span class="dj-icon">🎧</span>
        <span class="dj-text">DJ Mode</span>
      </a>
    </div>
    <div class="nav-right">
      <a href="spotify-library.html" class="spotify-library-btn" title="Spotify Library">
        <svg class="spotify-icon" viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
        </svg>
        <span>Library</span>
      </a>
      <div id="authButtonContainer"></div>
      <a href="apify.html" class="pro-button">
        <span class="pro-icon">⚡</span>
        <span>Pro</span>
      </a>
    </div>
  </nav>

  <!-- Landing Content -->
  <div class="landing-container page-transition">
    <div class="landing-logo">
      <img src="images/favicon.png" alt="Playlistify AI">
    </div>

    <h1 class="landing-title">
      Playlistify <span class="highlight">AI</span>
    </h1>

    <p class="landing-tagline">
      Describe your mood. Get your playlist. In seconds.<br>
      Your personal AI music agent that actually understands you.
    </p>

    <a href="app.html" class="landing-cta">
      <span>Get Started</span>
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14"></path>
        <path d="m12 5 7 7-7 7"></path>
      </svg>
    </a>

    <div class="landing-features">
      <div class="feature-badge stagger-item hover-lift">
        <i class="fas fa-bolt"></i>
        <span>Instant Generation</span>
      </div>
      <div class="feature-badge stagger-item hover-lift">
        <i class="fas fa-brain"></i>
        <span>AI-Powered</span>
      </div>
      <div class="feature-badge stagger-item hover-lift">
        <i class="fas fa-music"></i>
        <span>100M+ Tracks</span>
      </div>
      <div class="feature-badge stagger-item hover-lift">
        <i class="fas fa-microphone"></i>
        <span>Voice Input</span>
      </div>
    </div>
  </div>

  <script src="cursor.js"></script>
  <script src="userAuth.js"></script>
  <script src="auth-button.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      new AuthButton('authButtonContainer');

      // Smooth page transition for Get Started button
      const ctaButton = document.querySelector('.landing-cta');
      if (ctaButton) {
        ctaButton.addEventListener('click', (e) => {
          e.preventDefault();
          const href = ctaButton.getAttribute('href');

          // Fade out animation
          document.body.style.transition = 'opacity 0.3s ease';
          document.body.style.opacity = '0';

          setTimeout(() => {
            window.location.href = href;
          }, 300);
        });
      }

      // Add press effect and glow to CTA
      const cta = document.querySelector('.landing-cta');
      if (cta) {
        cta.classList.add('press-effect', 'glow-pulse');
      }
    });
  </script>
  <script src="page-transitions.js"></script>
</body>

</html>
