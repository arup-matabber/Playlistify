<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Playlistify AI</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Admin-specific styles */
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 100px 20px 40px;
    }

    .login-container {
      max-width: 400px;
      margin: 150px auto;
      padding: 40px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .login-container h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 1.8rem;
      color: #fff;
    }

    .login-container .icon {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.9rem;
    }

    .form-group input {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: rgba(139, 92, 246, 0.5);
      background: rgba(255, 255, 255, 0.08);
    }

    .login-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #8B5CF6, #EC4899);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    /* Dashboard styles */
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .dashboard-header h1 {
      font-size: 2rem;
      color: #fff;
    }

    .logout-btn {
      padding: 12px 24px;
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      color: #fca5a5;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.3);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 24px;
      text-align: center;
    }

    .stat-card .icon {
      font-size: 2rem;
      margin-bottom: 12px;
    }

    .stat-card .value {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #8B5CF6, #EC4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-card .label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
      margin-top: 8px;
    }

    .users-table-container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    .table-header {
      padding: 20px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .table-header h2 {
      font-size: 1.2rem;
      color: #fff;
    }

    .refresh-btn {
      padding: 8px 16px;
      background: rgba(139, 92, 246, 0.2);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 8px;
      color: #c4b5fd;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .refresh-btn:hover {
      background: rgba(139, 92, 246, 0.3);
    }

    .users-table {
      width: 100%;
      border-collapse: collapse;
    }

    .users-table th,
    .users-table td {
      padding: 16px 24px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .users-table th {
      background: rgba(255, 255, 255, 0.03);
      color: rgba(255, 255, 255, 0.7);
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .users-table td {
      color: rgba(255, 255, 255, 0.9);
      font-size: 0.95rem;
    }

    .users-table tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .playlist-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      padding: 6px 12px;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(236, 72, 153, 0.3));
      border-radius: 20px;
      font-weight: 600;
      color: #fff;
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .status-badge.connected {
      background: rgba(34, 197, 94, 0.2);
      color: #4ade80;
    }

    .status-badge.disconnected {
      background: rgba(156, 163, 175, 0.2);
      color: #9ca3af;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255, 255, 255, 0.5);
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .hidden {
      display: none !important;
    }

    /* Loading spinner */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #8B5CF6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .users-table-container {
        overflow-x: auto;
      }
      
      .users-table {
        min-width: 800px;
      }
    }
  </style>
</head>
<body>
  <!-- Animated Gradient Background -->
  <div class="gradient-bg">
    <div class="gradient-overlay"></div>
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>
    <div class="gradient-blob blob-3"></div>
    <div class="gradient-blob blob-4"></div>
    <div class="noise-overlay"></div>
  </div>

  <!-- Login Section -->
  <div id="loginSection" class="login-container">
    <div class="icon">🔐</div>
    <h1>Admin Login</h1>
    <div id="errorMsg" class="error-msg"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter admin username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter admin password" required>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>
  </div>

  <!-- Dashboard Section -->
  <div id="dashboardSection" class="admin-container hidden">
    <div class="dashboard-header">
      <h1>📊 Admin Dashboard</h1>
      <button class="logout-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="icon">👥</div>
        <div class="value" id="totalUsers">0</div>
        <div class="label">Total Users</div>
      </div>
      <div class="stat-card">
        <div class="icon">🎵</div>
        <div class="value" id="totalPlaylists">0</div>
        <div class="label">Total Playlists</div>
      </div>
      <div class="stat-card">
        <div class="icon">📅</div>
        <div class="value" id="todayUsers">0</div>
        <div class="label">New Users Today</div>
      </div>
      <div class="stat-card">
        <div class="icon">⚡</div>
        <div class="value" id="todayPlaylists">0</div>
        <div class="label">Playlists Today</div>
      </div>
    </div>

    <!-- Users Table -->
    <div class="users-table-container">
      <div class="table-header">
        <h2><i class="fas fa-users"></i> Registered Users</h2>
        <button class="refresh-btn" id="refreshBtn">
          <i class="fas fa-sync-alt"></i> Refresh
        </button>
      </div>
      <div id="tableContent">
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Admin Dashboard JavaScript
    const API_BASE = '/api/admin';
    let adminToken = localStorage.getItem('admin_token');

    // DOM Elements
    const loginSection = document.getElementById('loginSection');
    const dashboardSection = document.getElementById('dashboardSection');
    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const logoutBtn = document.getElementById('logoutBtn');
    const refreshBtn = document.getElementById('refreshBtn');

    // Check if already logged in
    async function checkAuth() {
      if (!adminToken) return false;
      
      try {
        const response = await fetch(`${API_BASE}/verify`, {
          headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        const data = await response.json();
        return data.valid;
      } catch {
        return false;
      }
    }

    // Initialize
    async function init() {
      const isLoggedIn = await checkAuth();
      
      if (isLoggedIn) {
        showDashboard();
      } else {
        localStorage.removeItem('admin_token');
        adminToken = null;
        showLogin();
      }
    }

    function showLogin() {
      loginSection.classList.remove('hidden');
      dashboardSection.classList.add('hidden');
    }

    function showDashboard() {
      loginSection.classList.add('hidden');
      dashboardSection.classList.remove('hidden');
      loadDashboardData();
    }

    // Login handler
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
      errorMsg.style.display = 'none';
      
      try {
        const response = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          adminToken = data.token;
          localStorage.setItem('admin_token', adminToken);
          showDashboard();
        } else {
          errorMsg.textContent = data.message || 'Invalid credentials';
          errorMsg.style.display = 'block';
        }
      } catch (error) {
        errorMsg.textContent = 'Connection error. Please try again.';
        errorMsg.style.display = 'block';
      }
      
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
    });

    // Logout handler
    logoutBtn.addEventListener('click', async () => {
      try {
        await fetch(`${API_BASE}/logout`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${adminToken}` }
        });
      } catch {}
      
      localStorage.removeItem('admin_token');
      adminToken = null;
      showLogin();
    });

    // Refresh handler
    refreshBtn.addEventListener('click', loadDashboardData);

    // Load dashboard data
    async function loadDashboardData() {
      await Promise.all([loadStats(), loadUsers()]);
    }

    // Load stats
    async function loadStats() {
      try {
        const response = await fetch(`${API_BASE}/stats`, {
          headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        
        if (!response.ok) throw new Error('Failed to fetch stats');
        
        const result = await response.json();
        const stats = result.data;
        
        document.getElementById('totalUsers').textContent = stats.totalUsers || 0;
        document.getElementById('totalPlaylists').textContent = stats.totalPlaylists || 0;
        document.getElementById('todayUsers').textContent = stats.todayUsers || 0;
        document.getElementById('todayPlaylists').textContent = stats.todayPlaylists || 0;
      } catch (error) {
        console.error('Error loading stats:', error);
      }
    }

    // Load users
    async function loadUsers() {
      const tableContent = document.getElementById('tableContent');
      tableContent.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      
      try {
        const response = await fetch(`${API_BASE}/users`, {
          headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        
        if (!response.ok) throw new Error('Failed to fetch users');
        
        const result = await response.json();
        const users = result.data;
        
        if (users.length === 0) {
          tableContent.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-users-slash"></i>
              <p>No registered users yet</p>
            </div>
          `;
          return;
        }
        
        tableContent.innerHTML = `
          <table class="users-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Playlists Generated</th>
                <th>Spotify</th>
                <th>Joined</th>
                <th>Last Active</th>
              </tr>
            </thead>
            <tbody>
              ${users.map(user => `
                <tr>
                  <td>#${user.id}</td>
                  <td><strong>${escapeHtml(user.username)}</strong></td>
                  <td>${escapeHtml(user.email)}</td>
                  <td><span class="playlist-count">${user.playlist_count || 0}</span></td>
                  <td>
                    <span class="status-badge ${user.spotify_connected ? 'connected' : 'disconnected'}">
                      ${user.spotify_connected ? 'Connected' : 'Not Connected'}
                    </span>
                  </td>
                  <td>${formatDate(user.created_at)}</td>
                  <td>${user.last_activity ? formatDate(user.last_activity) : 'Never'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (error) {
        console.error('Error loading users:', error);
        tableContent.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-exclamation-triangle"></i>
            <p>Error loading users. Please try again.</p>
          </div>
        `;
      }
    }

    // Helper functions
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'N/A';
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    // Initialize on load
    init();
  </script>
</body>
</html>
