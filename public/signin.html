<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Playlistify AI</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            z-index: 10;
        }

        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: var(--glass-shadow);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo {
            width: 70px;
            height: 70px;
            margin-bottom: 1.5rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .auth-header h1 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .auth-header .highlight {
            background: linear-gradient(135deg, var(--spotify-green) 0%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group label i {
            color: var(--spotify-green);
            font-size: 0.8rem;
        }

        .form-group input {
            padding: 0.9rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--spotify-green);
            background: rgba(29, 185, 84, 0.05);
            box-shadow: 0 0 0 3px rgba(29, 185, 84, 0.1);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .submit-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem;
            background: linear-gradient(135deg, var(--spotify-green) 0%, #1ed760 100%);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(29, 185, 84, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .form-switch {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        .form-switch a {
            color: var(--spotify-green);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .form-switch a:hover {
            color: var(--accent-cyan);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        .benefits-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .benefit-tag {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            background: rgba(29, 185, 84, 0.1);
            border: 1px solid rgba(29, 185, 84, 0.2);
            border-radius: 100px;
            font-size: 0.75rem;
            color: var(--spotify-green);
        }

        .benefit-tag i {
            font-size: 0.7rem;
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--text-primary);
        }

        /* Admin Panel Styles */
        .admin-panel {
            margin-top: 1.5rem;
            padding: 1.25rem;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 16px;
        }

        .admin-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
            color: #a78bfa;
        }

        .admin-icon {
            font-size: 1.2rem;
        }

        .admin-btn {
            width: 100%;
            padding: 0.875rem 1rem;
            background: linear-gradient(135deg, #8B5CF6, #7C3AED);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }

        .user-credentials-list {
            margin-top: 1rem;
            max-height: 300px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 0.75rem;
        }

        .user-credential-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }

        .user-credential-item:last-child {
            margin-bottom: 0;
        }

        .user-credential-item .username {
            color: var(--spotify-green);
            font-weight: 600;
        }

        .user-credential-item .password {
            color: var(--text-secondary);
            font-family: monospace;
        }

        .user-credentials-list::-webkit-scrollbar {
            width: 6px;
        }

        .user-credentials-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .user-credentials-list::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.5);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <!-- Animated Gradient Background -->
    <div class="gradient-bg">
        <div class="gradient-overlay"></div>
        <div class="gradient-blob blob-1"></div>
        <div class="gradient-blob blob-2"></div>
        <div class="gradient-blob blob-3"></div>
        <div class="gradient-blob blob-4"></div>
        <div class="noise-overlay"></div>
    </div>

    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="images/favicon.png" alt="Playlistify AI" class="auth-logo">
                <h1 id="formTitle">Welcome <span class="highlight">Back</span></h1>
                <p id="formSubtitle">Sign in to continue creating amazing playlists</p>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="loginUsername">
                        <i class="fas fa-user"></i> Username
                    </label>
                    <input type="text" id="loginUsername" placeholder="Enter your username" required>
                </div>
                
                <div class="form-group">
                    <label for="loginPassword">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                    <div style="text-align: right; margin-top: 0.5rem;">
                        <a href="#" id="showForgotPassword" style="color: var(--spotify-green); text-decoration: none; font-size: 0.85rem; font-weight: 500;">Forgot Password?</a>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Sign In</span>
                </button>
                
                <p class="form-switch">
                    Don't have an account? 
                    <a href="#" id="showSignup">Create one</a>
                </p>
            </form>
            
            <!-- Forgot Password Form (Hidden by default) -->
            <form id="forgotPasswordForm" class="auth-form" style="display: none;">
                <div class="form-group">
                    <label for="forgotUsername">
                        <i class="fas fa-user"></i> Username
                    </label>
                    <input type="text" id="forgotUsername" placeholder="Enter your username" required>
                </div>
                
                <div class="form-group">
                    <label for="forgotEmail">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" id="forgotEmail" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="newPassword">
                        <i class="fas fa-lock"></i> New Password
                    </label>
                    <input type="password" id="newPassword" placeholder="Enter new password (min 6 chars)" required minlength="6">
                </div>
                
                <button type="submit" class="submit-btn">
                    <i class="fas fa-key"></i>
                    <span>Reset Password</span>
                </button>
                
                <p class="form-switch">
                    Remember your password? 
                    <a href="#" id="showLoginFromForgot">Sign in</a>
                </p>
            </form>
            
            <!-- Signup Form (Hidden by default) -->
            <form id="signupForm" class="auth-form" style="display: none;">
                <div class="form-group">
                    <label for="signupUsername">
                        <i class="fas fa-user"></i> Username
                    </label>
                    <input type="text" id="signupUsername" placeholder="Choose a username" required minlength="3">
                </div>
                
                <div class="form-group">
                    <label for="signupEmail">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" id="signupEmail" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="signupPassword">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" id="signupPassword" placeholder="Create a password (min 6 chars)" required minlength="6">
                </div>
                
                <div class="form-group">
                    <label for="signupPasswordConfirm">
                        <i class="fas fa-shield-alt"></i> Confirm Password
                    </label>
                    <input type="password" id="signupPasswordConfirm" placeholder="Confirm your password" required minlength="6">
                </div>
                
                <button type="submit" class="submit-btn">
                    <i class="fas fa-user-plus"></i>
                    <span>Create Account</span>
                </button>
                
                <p class="form-switch">
                    Already have an account? 
                    <a href="#" id="showLogin">Sign in</a>
                </p>
            </form>
            
            <div id="errorMessage" class="error-message"></div>

            <!-- Admin Panel (hidden by default, shown only for admin) -->
            <div id="adminPanel" class="admin-panel" style="display: none;">
                <div class="admin-header">
                    <span class="admin-icon">🔐</span>
                    <span>Admin Controls</span>
                </div>
                <!-- SECURITY: Removed password display functionality -->
            </div>

            <div class="benefits-list">
                <span class="benefit-tag"><i class="fas fa-infinity"></i> Unlimited playlists</span>
                <span class="benefit-tag"><i class="fas fa-brain"></i> AI powered</span>
                <span class="benefit-tag"><i class="fas fa-bolt"></i> Instant</span>
            </div>
        </div>

        <a href="/" class="back-link">
            <i class="fas fa-arrow-left"></i>
            Back to Home
        </a>
    </div>

    <script src="cursor.js"></script>
    <script src="userAuth.js"></script>
    <script>
        // Form switching
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const forgotPasswordForm = document.getElementById('forgotPasswordForm');
        const showSignup = document.getElementById('showSignup');
        const showLogin = document.getElementById('showLogin');
        const showForgotPassword = document.getElementById('showForgotPassword');
        const showLoginFromForgot = document.getElementById('showLoginFromForgot');
        const formTitle = document.getElementById('formTitle');
        const formSubtitle = document.getElementById('formSubtitle');
        const errorMessage = document.getElementById('errorMessage');

        showSignup.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.style.display = 'none';
            forgotPasswordForm.style.display = 'none';
            signupForm.style.display = 'flex';
            formTitle.innerHTML = 'Create <span class="highlight">Account</span>';
            formSubtitle.textContent = 'Join Playlistify AI and start your journey';
            errorMessage.style.display = 'none';
        });

        showLogin.addEventListener('click', (e) => {
            e.preventDefault();
            signupForm.style.display = 'none';
            forgotPasswordForm.style.display = 'none';
            loginForm.style.display = 'flex';
            formTitle.innerHTML = 'Welcome <span class="highlight">Back</span>';
            formSubtitle.textContent = 'Sign in to continue creating amazing playlists';
            errorMessage.style.display = 'none';
        });

        showForgotPassword.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.style.display = 'none';
            signupForm.style.display = 'none';
            forgotPasswordForm.style.display = 'flex';
            formTitle.innerHTML = 'Reset <span class="highlight">Password</span>';
            formSubtitle.textContent = 'Enter your username and email to reset your password';
            errorMessage.style.display = 'none';
        });

        showLoginFromForgot.addEventListener('click', (e) => {
            e.preventDefault();
            signupForm.style.display = 'none';
            forgotPasswordForm.style.display = 'none';
            loginForm.style.display = 'flex';
            formTitle.innerHTML = 'Welcome <span class="highlight">Back</span>';
            formSubtitle.textContent = 'Sign in to continue creating amazing playlists';
            errorMessage.style.display = 'none';
        });

        // Show error message
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        // Check if admin credentials
        function isAdminLogin(username, password) {
            return username === 'admin' && password === 'admin';
        }

        // SECURITY: Removed showUserCredentials function - passwords should never be exposed

        // Login form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            // Check for admin login first
            if (isAdminLogin(username, password)) {
                // Show admin panel instead of redirecting
                document.getElementById('adminPanel').style.display = 'block';
                formTitle.innerHTML = 'Admin <span class="highlight">Panel</span>';
                formSubtitle.textContent = 'You have admin access';
                loginForm.style.display = 'none';
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Store user session
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('auth_user', JSON.stringify(data.user));
                    if (window.userAuth) {
                        window.userAuth.token = data.token;
                        window.userAuth.user = data.user;
                    }
                    // Redirect to main app
                    window.location.href = '/app.html';
                } else {
                    showError(data.message || 'Login failed. Please try again.');
                }
            } catch (error) {
                showError('Connection error. Please try again.');
            }
        });

        // Forgot Password form submission
        forgotPasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('forgotUsername').value;
            const email = document.getElementById('forgotEmail').value;
            const newPassword = document.getElementById('newPassword').value;

            if (newPassword.length < 6) {
                showError('Password must be at least 6 characters.');
                return;
            }

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, newPassword })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showError(''); // Clear error
                    errorMessage.style.background = 'rgba(29, 185, 84, 0.1)';
                    errorMessage.style.borderColor = 'rgba(29, 185, 84, 0.3)';
                    errorMessage.style.color = '#4ade80';
                    errorMessage.textContent = 'Password reset successfully! Redirecting to login...';
                    errorMessage.style.display = 'block';
                    
                    // Reset form
                    forgotPasswordForm.reset();
                    
                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        showLoginFromForgot.click();
                        errorMessage.style.background = 'rgba(239, 68, 68, 0.1)';
                        errorMessage.style.borderColor = 'rgba(239, 68, 68, 0.3)';
                        errorMessage.style.color = '#f87171';
                    }, 2000);
                } else {
                    errorMessage.style.background = 'rgba(239, 68, 68, 0.1)';
                    errorMessage.style.borderColor = 'rgba(239, 68, 68, 0.3)';
                    errorMessage.style.color = '#f87171';
                    showError(data.message || 'Password reset failed. Please check your username and email.');
                }
            } catch (error) {
                errorMessage.style.background = 'rgba(239, 68, 68, 0.1)';
                errorMessage.style.borderColor = 'rgba(239, 68, 68, 0.3)';
                errorMessage.style.color = '#f87171';
                showError('Connection error. Please try again.');
            }
        });

        // Signup form submission
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('signupUsername').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const passwordConfirm = document.getElementById('signupPasswordConfirm').value;

            if (password !== passwordConfirm) {
                showError('Passwords do not match.');
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Store user session
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('auth_user', JSON.stringify(data.user));
                    if (window.userAuth) {
                        window.userAuth.token = data.token;
                        window.userAuth.user = data.user;
                    }
                    // Redirect to main app
                    window.location.href = '/app.html';
                } else {
                    showError(data.message || 'Registration failed. Please try again.');
                }
            } catch (error) {
                showError('Connection error. Please try again.');
            }
        });
    </script>
</body>
</html>
