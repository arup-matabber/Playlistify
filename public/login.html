<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect to Spotify - Playlistify</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="spotify-connect-container">
        <div class="connect-card">
            <div class="spotify-logo">
                <i class="fab fa-spotify"></i>
            </div>
            
            <h1>Welcome to Playlistify</h1>
            <p class="subtitle">Connect your Spotify account to start creating AI-powered playlists</p>
            
            <button id="connectBtn" class="connect-btn">
                <i class="fab fa-spotify"></i>
                <span>Connect with Spotify</span>
            </button>
            
            <div class="benefits">
                <div class="benefit-item">
                    <i class="fas fa-check-circle"></i>
                    <span>Access your playlists</span>
                </div>
                <div class="benefit-item">
                    <i class="fas fa-check-circle"></i>
                    <span>Create personalized playlists</span>
                </div>
                <div class="benefit-item">
                    <i class="fas fa-check-circle"></i>
                    <span>Discover new music</span>
                </div>
                <div class="benefit-item">
                    <i class="fas fa-check-circle"></i>
                    <span>AI-powered recommendations</span>
                </div>
            </div>

            <div class="security-note">
                <i class="fas fa-lock"></i>
                <span>Secure OAuth authentication. We never see your password.</span>
            </div>
        </div>

        <div class="background-animation">
            <div class="music-note note-1">♪</div>
            <div class="music-note note-2">♫</div>
            <div class="music-note note-3">♪</div>
            <div class="music-note note-4">♫</div>
            <div class="music-note note-5">♪</div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // Wait for DOM to be fully loaded
        document.addEventListener('DOMContentLoaded', () => {
            const connectBtn = document.getElementById('connectBtn');
            
            // Check if user is already authenticated
            if (window.spotifyAuth && window.spotifyAuth.isAuthenticated()) {
                window.location.href = '/app.html';
                return;
            }

            // Handle connect button click
            if (connectBtn) {
                connectBtn.addEventListener('click', function() {
                    // Show loading state
                    this.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Connecting...</span>';
                    this.disabled = true;
                    
                    // Redirect to auth login endpoint
                    if (window.spotifyAuth) {
                        window.spotifyAuth.login();
                    } else {
                        // Fallback: direct redirect
                        window.location.href = '/auth/login';
                    }
                });
            }
        });
    </script>
</body>
</html>
